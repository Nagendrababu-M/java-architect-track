<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Java Architect Track &mdash; 22-Week Curriculum</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,800&family=JetBrains+Mono:wght@400;500;700&family=Inter+Tight:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,400,1,0" rel="stylesheet">
<link rel="stylesheet" href="assets/styles.css">
<style>
  /* Landing-page only overrides */
  .hero-stat {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink-dim);
    margin-right: 20px;
  }
  .hero-stat strong { color: var(--accent); }

  /* ── Search ───────────────────────────────────────────────── */
  .search-bar {
    display: flex;
    align-items: center;
    width: 40px;
    overflow: hidden;
    margin-bottom: -2px;
    transition: width .3s cubic-bezier(0.4,0,0.2,1);
  }
  .search-bar.open {
    width: min(320px, 55vw);
  }
  .search-icon-btn {
    background: none;
    border: none;
    padding: 8px 8px;
    color: var(--ink-faint);
    cursor: pointer;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    transition: color .15s;
  }
  .search-icon-btn:hover { color: var(--ink-dim); }
  .search-bar.open .search-icon-btn { color: var(--accent); }
  .search-icon-btn .material-symbols-rounded { font-size: 20px; }
  #search-input {
    flex: 1;
    min-width: 0;
    border: none;
    background: transparent;
    color: var(--ink);
    font-family: 'Roboto', sans-serif;
    font-size: 14px;
    outline: none;
    padding: 4px 4px;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s .1s;
  }
  #search-input::placeholder { color: var(--ink-faint); }
  .search-bar.open #search-input { opacity: 1; pointer-events: all; }
  .search-close-btn {
    background: none;
    border: none;
    padding: 8px 8px;
    color: var(--ink-faint);
    cursor: pointer;
    display: flex;
    align-items: center;
    flex-shrink: 0;
    opacity: 0;
    pointer-events: none;
    transition: color .15s, opacity .15s;
  }
  .search-bar.open .search-close-btn { opacity: 1; pointer-events: all; }
  .search-close-btn:hover { color: var(--ink); }
  .search-close-btn .material-symbols-rounded { font-size: 18px; }

  /* ── Search results panel ─────────────────────────────────── */
  #search-panel { display: none; }
  #search-panel.active { display: block; }
  .search-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--ink-faint);
    letter-spacing: .06em;
    text-transform: uppercase;
    margin: 20px 0 14px;
  }
  .search-meta strong { color: var(--ink-dim); }
  .search-results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: 12px;
  }
  .search-result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 5px;
    transition: border-color .15s, transform .12s;
  }
  .search-result-card:hover {
    border-color: var(--accent);
    transform: translateY(-2px);
  }
  .search-result-card.locked {
    opacity: .55;
    cursor: default;
    pointer-events: none;
  }
  .src-day {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    letter-spacing: .05em;
  }
  .src-title {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.35;
  }
  .src-title mark {
    background: var(--md-primary-container, rgba(19,85,193,0.18));
    color: var(--md-on-primary-container, var(--ink));
    border-radius: 2px;
    padding: 0 1px;
  }
  .src-meta {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 4px;
  }
  .src-topic {
    font-size: 11px;
    padding: 2px 7px;
    border-radius: 20px;
    background: var(--bg);
    color: var(--ink-dim);
    border: 1px solid var(--border);
  }
  .src-week {
    font-size: 11px;
    color: var(--ink-faint);
    align-self: center;
  }
  .search-empty {
    padding: 48px 0;
    text-align: center;
    color: var(--ink-faint);
    font-size: 14px;
  }
</style>
</head>
<body>

<div class="container-wide">

  <!-- ── HERO ─────────────────────────────────────────────── -->
  <section class="hero">
    <div class="hero-top-row">
      <div class="hero-label">Java Architect Track</div>
    </div>
    <h1>
      Senior Dev
      <span class="heartbeat-wrap">
        <svg class="heartbeat-svg" id="heartbeat-svg" viewBox="0 0 360 50" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        </svg>
      </span>
      Staff Architect
    </h1>

    <!-- Progress bar -->
    <div class="progress-block">
      <div class="progress-top-row">
        <div class="progress-phases">
          <!-- rendered by renderPhaseChips() in app.js -->
        </div>
        <div class="progress-meta" style="display:none">
          <span class="progress-count" id="progress-count">0 <span class="progress-of">of 158 days</span></span>
          <span class="progress-pct" id="progress-pct">0%</span>
        </div>
      </div>
      <div class="progress-bar-track" style="display:none">
        <div class="progress-bar-fill" id="progress-bar-fill" style="width:0%"></div>
      </div>
    </div>
  </section>

  <nav class="tab-nav" id="tab-nav">
    <button class="tab-btn active" data-tab="day"   onclick="switchTab('day')">Browse by Day</button>
    <button class="tab-btn"        data-tab="topic" onclick="switchTab('topic')">Browse by Topic</button>
    <div class="tab-search" id="search-wrap">
      <div class="search-bar" id="search-bar">
        <button class="search-icon-btn" id="search-trigger" onclick="toggleSearch()" title="Search (/)">
          <span class="material-symbols-rounded">search</span>
        </button>
        <input id="search-input" type="search" placeholder="Search topics, days…" autocomplete="off" oninput="handleSearch(this.value)" />
        <button class="search-close-btn" id="search-close" onclick="closeSearch()" title="Close">
          <span class="material-symbols-rounded">close</span>
        </button>
      </div>
    </div>
  </nav>

  <!-- ── BY DAY ──────────────────────────────────────────── -->
  <!-- SEARCH RESULTS -->
  <div id="search-panel"></div>

    <div class="tab-panel active" id="by-day-panel">
    <p class="section-label">All 22 Weeks</p>
    <!-- Rendered by app.js renderByDay() -->
  </div>

  <!-- ── BY TOPIC ─────────────────────────────────────────── -->
  <div class="tab-panel" id="by-topic-panel">
    <p class="section-label">By Topic</p>
    <!-- Rendered by app.js renderByTopic() -->
  </div>

  <!-- ── FOOTER ───────────────────────────────────────────── -->
  <footer>
    22 weeks &middot; 158 days &middot; 6 phases &nbsp;|&nbsp;
    Phase 1: Advanced Java &middot; Phase 2: DSA &middot; Phase 3: System Design &middot; Phase 4: AWS &amp; DevOps &middot; Phase 5: AI &middot; Phase 6: Interview
  </footer>

</div>

<script src="data/curriculum.js"></script>
<script src="assets/app.js"></script>
</body>
</html>
